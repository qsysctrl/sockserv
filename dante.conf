# Dante SOCKS Server Configuration for Benchmarking
# /etc/sockd.conf or use with -f flag

logoutput: /tmp/dante.log

# Internal interface - listen on port 1081 (to avoid conflict with sockserv)
internal: 127.0.0.1 port = 1081

# External interface - same as internal for localhost testing
external: 127.0.0.1

# Authentication - none for benchmarking
authentication: none

# Client access - allow all from localhost
client pass {
    from: 127.0.0.0/8 to: 0.0.0.0/0
    log: connect disconnect
}

# SOCKS rules - allow all
pass {
    from: 127.0.0.0/8 to: 0.0.0.0/0
    protocol: tcp udp
    log: connect disconnect
}
